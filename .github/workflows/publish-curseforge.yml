name: Publish to CurseForge

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to package and upload
        required: true
        type: string
      release_type:
        description: CurseForge release type
        required: true
        default: release
        type: choice
        options:
          - release
          - beta
          - alpha

permissions:
  contents: read

env:
  ADDON_NAME: HardcoreCongrats
  CURSEFORGE_BASE_URL: https://wow.curseforge.com
  CURSEFORGE_PROJECT_ID: "912849"

jobs:
  publish:
    name: Upload addon package
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          # Write the changelog outside the workspace so the checkout step below
          # (which cleans the working directory) does not delete it.
          if [[ "${{ github.event_name }}" == "release" ]]; then
            tag="$(jq -r '.release.tag_name' "$GITHUB_EVENT_PATH")"
            prerelease="$(jq -r '.release.prerelease' "$GITHUB_EVENT_PATH")"
            jq -r '.release.body // ""' "$GITHUB_EVENT_PATH" > "$RUNNER_TEMP/CHANGELOG.md"

            if [[ "$prerelease" == "true" ]]; then
              release_type="beta"
            else
              release_type="release"
            fi
          else
            tag="${{ inputs.tag }}"
            release_type="${{ inputs.release_type }}"
            printf 'Manual CurseForge upload for %s\n' "$tag" > "$RUNNER_TEMP/CHANGELOG.md"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_type=$release_type" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Build addon zip
        shell: bash
        run: |
          rm -rf dist
          mkdir -p "dist/${ADDON_NAME}"
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='dist/' \
            --exclude='.gitignore' \
            ./ "dist/${ADDON_NAME}/"
          cd dist
          zip -r "${ADDON_NAME}-${{ steps.release.outputs.tag }}.zip" "${ADDON_NAME}"

      - name: Prepare CurseForge metadata
        shell: bash
        env:
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
        run: |
          if [[ -z "$CURSEFORGE_API_TOKEN" ]]; then
            echo "Missing CURSEFORGE_API_TOKEN repository secret." >&2
            exit 1
          fi

          # Derive the game version from the TOC interface (e.g. 11508 -> 1.15.8)
          # and resolve CurseForge's numeric id for it, so the file is pinned to
          # exactly that version (Classic Era). Letting CurseForge infer the
          # version from the TOC produced spurious Classic TBC duplicates.
          iface="$(grep -iE '^## Interface:' "${ADDON_NAME}.toc" | grep -oE '[0-9]+' | head -1)"
          if [[ -z "$iface" ]]; then
            echo "Could not read '## Interface:' from ${ADDON_NAME}.toc" >&2
            exit 1
          fi
          version_string="$((10#$iface / 10000)).$((10#$iface / 100 % 100)).$((10#$iface % 100))"
          echo "TOC interface $iface -> game version $version_string"

          versions_json="$(curl -sf \
            --header "X-Api-Token: ${CURSEFORGE_API_TOKEN}" \
            "${CURSEFORGE_BASE_URL}/api/game/versions")"

          game_version_id="$(jq --arg v "$version_string" \
            'map(select(.name == $v)) | .[0].id // empty' <<<"$versions_json")"

          if [[ -z "$game_version_id" ]]; then
            echo "No CurseForge game version matches '$version_string'. Available 1.x versions:" >&2
            jq -r '.[] | select(.name | startswith("1.")) | .name' <<<"$versions_json" | sort -u >&2
            exit 1
          fi
          echo "Resolved CurseForge game version id: $game_version_id"

          jq -n \
            --rawfile changelog "$RUNNER_TEMP/CHANGELOG.md" \
            --arg displayName "${{ steps.release.outputs.tag }}" \
            --arg releaseType "${{ steps.release.outputs.release_type }}" \
            --argjson gameVersions "[$game_version_id]" \
            '{
              changelog: $changelog,
              changelogType: "markdown",
              displayName: $displayName,
              gameVersions: $gameVersions,
              releaseType: $releaseType
            }' > metadata.json

          echo "metadata.json:"; jq '.gameVersions, .displayName' metadata.json

      - name: Upload to CurseForge
        shell: bash
        env:
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
        run: |
          if [[ -z "$CURSEFORGE_API_TOKEN" ]]; then
            echo "Missing CURSEFORGE_API_TOKEN repository secret." >&2
            exit 1
          fi

          curl --fail-with-body \
            --header "X-Api-Token: ${CURSEFORGE_API_TOKEN}" \
            --form "metadata=<metadata.json;type=application/json" \
            --form "file=@dist/${ADDON_NAME}-${{ steps.release.outputs.tag }}.zip" \
            "${CURSEFORGE_BASE_URL}/api/projects/${CURSEFORGE_PROJECT_ID}/upload-file"
